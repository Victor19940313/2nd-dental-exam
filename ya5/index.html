<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牙醫學（五）補綴＋咬合 國考互動筆記</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════
   ROOT TOKENS — 格子筆記本配色系統
══════════════════════════════════════════════ */
:root{
  /* 底色 */
  --bg:        #f8f7f0;
  --bg-card:   #ffffff;
  --bg-sidebar:#fefdf8;

  /* 格子線 */
  --grid-color: rgba(160,155,130,0.18);
  --grid-size:  22px;

  /* 字色 */
  --text:      #2d2a22;
  --text-sub:  #7a7060;
  --text-inv:  #ffffff;

  /* 邊線 */
  --border:    #e4e0d4;
  --border-dk: #c8c3b0;

  /* 🔴 Critical / 必考 */
  --c-bg:  #fff0f2; --c-bd: #f87171; --c-tx: #b91c1c;
  /* 🟠 High / 高頻 */
  --h-bg:  #fff4e8; --h-bd: #fb923c; --h-tx: #c2410c;
  /* 🟡 Mid / 中頻 */
  --m-bg:  #fefce8; --m-bd: #facc15; --m-tx: #92400e;
  /* 🟢 Green / 解析・正確 */
  --g-bg:  #f0fdf4; --g-bd: #4ade80; --g-tx: #15803d;
  /* 🔵 Blue / 定義・概念 */
  --b-bg:  #eff6ff; --b-bd: #60a5fa; --b-tx: #1d4ed8;
  /* 🟣 Purple / 考古題・例題 */
  --p-bg:  #f5f3ff; --p-bd: #a78bfa; --p-tx: #5b21b6;
  /* 🩵 Teal / 臨床數值 */
  --t-bg:  #f0fdfa; --t-bd: #2dd4bf; --t-tx: #0f766e;

  /* 主題色（補綴=indigo, 咬合=amber） */
  --prostho:   #3730a3;
  --occ:       #92400e;
  --review:    #5b21b6;
}

/* ══════════════════════════════════════════════
   RESET + BASE
══════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;}
html{font-size:15px;}
body{
  font-family:'Noto Sans TC',-apple-system,BlinkMacSystemFont,sans-serif;
  background-color:var(--bg);
  background-image:
    linear-gradient(var(--grid-color) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
  background-size: var(--grid-size) var(--grid-size);
  color:var(--text);
  line-height:1.75;
  overflow-x:hidden;
}

/* ══════════════════════════════════════════════
   HOME PAGE
══════════════════════════════════════════════ */
.home{
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2.5rem 1.5rem;
  position:relative;
}
.home-badge{
  background:var(--bg-card);border:1.5px solid var(--border-dk);
  border-radius:999px;padding:.35rem 1.1rem;font-size:.75rem;
  font-weight:700;color:var(--text-sub);letter-spacing:.06em;
  margin-bottom:1rem;
}
.home h1{
  font-size:1.9rem;font-weight:900;color:var(--text);
  text-align:center;margin-bottom:.5rem;letter-spacing:-.01em;
  line-height:1.3;
}
.home-sub{
  color:var(--text-sub);font-size:.9rem;text-align:center;
  margin-bottom:2.5rem;
}
.home-cards{
  display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;
  width:100%;max-width:640px;
}
@media(max-width:560px){.home-cards{grid-template-columns:1fr;max-width:320px;}}
.home-card{
  background:var(--bg-card);
  border:1.5px solid var(--border);
  border-radius:16px;padding:1.8rem 1.2rem;
  text-align:center;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.07);
  transition:transform .2s,box-shadow .2s,border-color .2s;
}
.home-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.12);}
.home-card.prostho{border-top:4px solid var(--prostho);}
.home-card.occ     {border-top:4px solid var(--occ);}
.home-card.review  {border-top:4px solid var(--review);}
.home-card.tw      {border-top:5px solid #2563eb;}
.home-card .icon{font-size:2.6rem;margin-bottom:.6rem;line-height:1;}
.home-card h2{font-size:1.05rem;font-weight:800;margin-bottom:.3rem;}
.home-card p{font-size:.78rem;color:var(--text-sub);line-height:1.5;}
.home-back{
  position:absolute;top:1rem;right:1rem;
  background:var(--bg-card);border:1.5px solid var(--border);
  color:var(--text-sub);padding:.3rem .8rem;border-radius:8px;
  font-size:.8rem;cursor:pointer;
}
.home-back:hover{border-color:var(--border-dk);}

/* ══════════════════════════════════════════════
   SECTION VIEW (側欄 + 內容)
══════════════════════════════════════════════ */
.section-view{display:none;height:100vh;flex-direction:column;}
@supports(height:100dvh){.section-view{height:100dvh;}}

/* TOP BAR */
.top-bar{
  background:var(--bg-card);
  border-bottom:1.5px solid var(--border);
  padding:.6rem 1rem;
  display:flex;align-items:center;gap:.7rem;
  flex-shrink:0;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.top-bar.prostho-bar .bar-title{color:var(--prostho);}
.top-bar.occ-bar     .bar-title{color:var(--occ);}
.back-btn{
  background:var(--bg);border:1.5px solid var(--border);
  color:var(--text-sub);padding:.25rem .7rem;
  border-radius:7px;cursor:pointer;font-size:.8rem;font-weight:500;
  flex-shrink:0;
}
.back-btn:hover{background:var(--border);color:var(--text);}
.bar-title{font-size:.95rem;font-weight:800;letter-spacing:-.01em;}
.search-box{
  margin-left:auto;background:var(--bg);
  border:1.5px solid var(--border);
  color:var(--text);padding:.28rem .85rem;
  border-radius:20px;font-size:.82rem;outline:none;width:180px;
  font-family:inherit;
}
.search-box:focus{border-color:var(--border-dk);}
.menu-btn{
  display:none;background:var(--bg);border:1.5px solid var(--border);
  color:var(--text-sub);font-size:1.1rem;padding:.25rem .5rem;
  border-radius:7px;cursor:pointer;flex-shrink:0;
}

/* MAIN LAYOUT */
.main-layout{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{
  width:270px;background:var(--bg-sidebar);
  border-right:1.5px solid var(--border);
  overflow-y:auto;flex-shrink:0;
}
.sidebar-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.35);z-index:199;
}

/* progress */
.prog-wrap{padding:.8rem 1rem .5rem;border-bottom:1px solid var(--border);}
.prog-labels{display:flex;justify-content:space-between;
  font-size:.72rem;color:var(--text-sub);margin-bottom:.3rem;}
.prog-track{background:var(--border);border-radius:999px;height:5px;}
.prog-bar{height:100%;border-radius:999px;background:linear-gradient(90deg,#818cf8,#6366f1);transition:width .4s;}

/* tree */
.tree-node{border-bottom:1px solid var(--border);}
.tree-parent{
  display:flex;align-items:center;gap:.5rem;
  padding:.65rem 1rem;cursor:pointer;
  font-weight:700;font-size:.85rem;transition:background .15s;
}
.tree-parent:hover{background:var(--bg);}
.tree-parent.active{background:var(--bg);}
.tree-children{display:none;background:var(--bg-card);}
.tree-children.open{display:block;}
.tree-child{
  display:flex;align-items:center;gap:.45rem;
  padding:.5rem .9rem .5rem 2rem;cursor:pointer;
  font-size:.82rem;border-left:3px solid transparent;
  transition:all .12s;
}
.tree-child:hover{background:var(--bg);border-left-color:var(--border-dk);}
.tree-child.active{background:var(--b-bg);border-left-color:#6366f1;color:var(--prostho);font-weight:700;}
.tree-child.reviewed::after{content:" ✓";color:var(--g-tx);font-size:.72rem;font-weight:700;margin-left:auto;}
.tree-arrow{margin-left:auto;font-size:.65rem;color:var(--text-sub);transition:transform .2s;}
.tree-arrow.open{transform:rotate(90deg);}
.child-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}

/* freq dot */
.fdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.fdot-critical{background:var(--c-bd);}
.fdot-high    {background:var(--h-bd);}
.fdot-mid     {background:var(--m-bd);}
.fdot-low     {background:#d1d5db;}

/* ══════════════════════════════════════════════
   CONTENT PANEL
══════════════════════════════════════════════ */
.content-panel{
  flex:1;overflow-y:auto;
  padding:1.6rem 2rem;
  background:var(--bg);
}
.content-placeholder{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;color:var(--text-sub);
  text-align:center;gap:.5rem;
}
.content-placeholder .big{font-size:2.5rem;}
.content-body{max-width:840px;}

/* HEADINGS */
.content-body h2{
  font-size:1.05rem;font-weight:900;color:var(--text);
  margin:0 0 1rem;padding-bottom:.5rem;
  border-bottom:2.5px solid var(--m-bd);
  display:flex;align-items:center;gap:.5rem;
}
.content-body h3{
  font-size:.9rem;font-weight:800;color:var(--text);
  margin:1.2rem 0 .5rem;
  padding:.3rem .75rem;
  background:var(--bg-card);
  border-left:4px solid var(--border-dk);
  border-radius:0 6px 6px 0;
  cursor:pointer;user-select:none;
  display:flex;align-items:center;gap:.3rem;
}
.content-body h3::after{
  content:"▾";margin-left:auto;font-size:.7rem;
  color:var(--text-sub);transition:transform .2s;display:inline-block;
}
.content-body h3.collapsed::after{transform:rotate(-90deg);}
.content-body h4{
  font-size:.84rem;font-weight:700;color:var(--text-sub);
  margin:.8rem 0 .3rem;
  padding-left:.6rem;
  border-left:2px solid var(--border-dk);
}

/* INLINE EMPHASIS */
.content-body strong{color:var(--text);font-weight:700;}
.content-body strong em,.content-body em strong{color:var(--c-tx);font-style:normal;font-weight:800;}
.content-body em{color:var(--h-tx);font-style:italic;}
.num{color:var(--c-tx);font-weight:800;}   /* 臨床數值 */

/* ══════════════════════════════════════════════
   HIGHLIGHT BOXES  (核心元素)
══════════════════════════════════════════════ */
.hl{padding:.65rem 1rem;border-radius:8px;margin:.6rem 0;font-size:.85rem;line-height:1.7;border-left:4px solid;}
.hl-red   {background:var(--c-bg);border-color:var(--c-bd);color:var(--c-tx);}
.hl-orange{background:var(--h-bg);border-color:var(--h-bd);color:var(--h-tx);}
.hl-yellow{background:var(--m-bg);border-color:var(--m-bd);color:var(--m-tx);}
.hl-green {background:var(--g-bg);border-color:var(--g-bd);color:var(--g-tx);}
.hl-blue  {background:var(--b-bg);border-color:var(--b-bd);color:var(--b-tx);}
.hl-purple{background:var(--p-bg);border-color:var(--p-bd);color:var(--p-tx);}
.hl-teal  {background:var(--t-bg);border-color:var(--t-bd);color:var(--t-tx);}

/* ── 特殊 box 頭部標題 ── */
.hl-red::before   {content:"⚠️ 常見陷阱";display:block;font-weight:800;font-size:.75rem;margin-bottom:.25rem;letter-spacing:.04em;}
.hl-green::before {content:"💡 解析";    display:block;font-weight:800;font-size:.75rem;margin-bottom:.25rem;letter-spacing:.04em;}
.hl-blue::before  {content:"📖 定義";    display:block;font-weight:800;font-size:.75rem;margin-bottom:.25rem;letter-spacing:.04em;}
.hl-teal::before  {content:"📊 重要數值";display:block;font-weight:800;font-size:.75rem;margin-bottom:.25rem;letter-spacing:.04em;}
.hl-purple::before{content:"📝 考古題";  display:block;font-weight:800;font-size:.75rem;margin-bottom:.25rem;letter-spacing:.04em;}
.hl-yellow::before{content:"🧠 記憶口訣";display:block;font-weight:800;font-size:.75rem;margin-bottom:.25rem;letter-spacing:.04em;}
.hl-orange::before{content:"⭐ 考試重點";display:block;font-weight:800;font-size:.75rem;margin-bottom:.25rem;letter-spacing:.04em;}

/* no-label variant */
.hl.no-label::before{display:none;}

/* ══════════════════════════════════════════════
   TABLE
══════════════════════════════════════════════ */
.content-body table{
  width:100%;border-collapse:collapse;margin:.7rem 0;
  font-size:.82rem;border-radius:10px;overflow:hidden;
  border:1px solid #d4d0c8;
  background:#ffffff;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.content-body th{
  background:#3b3530;color:#fef9c3;
  padding:.45rem .7rem;text-align:left;
  font-weight:800;font-size:.8rem;
  border-bottom:2px solid #c8c3b0;
}
.content-body td{
  padding:.42rem .7rem;
  border-bottom:1px solid #e8e4da;
  vertical-align:top;line-height:1.6;
}
.content-body tr:last-child td{border-bottom:none;}
.content-body tr:nth-child(odd) td{background:#ffffff;}
.content-body tr:nth-child(even) td{background:#f0f0ea;}
.content-body tr:hover td{background:#e8f0fe;}
/* colored cells */
.td-r{color:var(--c-tx);font-weight:700;}
.td-g{color:var(--g-tx);font-weight:600;}
.td-b{color:var(--b-tx);font-weight:600;}
.td-k{font-weight:700;}

/* ══════════════════════════════════════════════
   LIST
══════════════════════════════════════════════ */
ul.n{list-style:none;padding:0;margin:.45rem 0;}
ul.n li{
  padding:.28rem 0 .28rem 1.3rem;position:relative;
  font-size:.85rem;border-bottom:1px solid #f0ede4;
}
ul.n li:last-child{border-bottom:none;}
ul.n li::before{content:"▸";position:absolute;left:0;color:var(--text-sub);}
ul.n li.li-r::before{color:var(--c-bd);}
ul.n li.li-g::before{color:var(--g-bd);}

/* num-grid */
.num-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:.5rem;margin:.65rem 0;
}
.num-card{
  background:var(--bg-card);border:1.5px solid var(--border);
  border-radius:10px;padding:.7rem;text-align:center;
}
.num-card .big{font-size:1.4rem;font-weight:900;color:var(--c-tx);}
.num-card .sm{font-size:.72rem;color:var(--text-sub);line-height:1.4;}

/* steps */
.steps{counter-reset:step;margin:.5rem 0;}
.step{
  counter-increment:step;
  background:var(--bg-card);border:1.5px solid var(--border);
  border-radius:8px;padding:.55rem .9rem;margin:.35rem 0;
  font-size:.84rem;display:flex;gap:.6rem;align-items:baseline;
}
.step::before{
  content:counter(step);
  min-width:1.4rem;height:1.4rem;background:#6366f1;
  color:white;border-radius:50%;display:inline-flex;
  align-items:center;justify-content:center;
  font-size:.72rem;font-weight:800;flex-shrink:0;
}

/* freq badge */
.freq-badge{
  display:inline-block;font-size:.68rem;padding:.12rem .5rem;
  border-radius:999px;font-weight:800;margin-left:.4rem;vertical-align:middle;
}
.badge-critical{background:var(--c-bg);color:var(--c-tx);border:1px solid var(--c-bd);}
.badge-high    {background:var(--h-bg);color:var(--h-tx);border:1px solid var(--h-bd);}
.badge-mid     {background:var(--m-bg);color:var(--m-tx);border:1px solid var(--m-bd);}
.badge-low     {background:#f1f5f9;    color:var(--text-sub);border:1px solid var(--border);}

/* review btn */
.review-btn{
  display:inline-flex;align-items:center;gap:.35rem;
  margin:1rem 0 0;background:none;border:1.5px solid var(--border);
  border-radius:7px;padding:.3rem .8rem;font-size:.8rem;
  color:var(--text-sub);cursor:pointer;transition:all .18s;
  font-family:inherit;
}
.review-btn:hover{border-color:var(--g-bd);color:var(--g-tx);}
.review-btn.done{
  background:var(--g-bg);border-color:var(--g-bd);
  color:var(--g-tx);font-weight:700;
}
.review-btn.done::before{content:"✓ ";}

/* ══════════════════════════════════════════════
   QUICK REVIEW
══════════════════════════════════════════════ */
.qr-view{display:none;height:100vh;flex-direction:column;background:#1e1b4b;}
@supports(height:100dvh){.qr-view{height:100dvh;}}
.qr-bar{
  background:#312e81;color:white;
  padding:.65rem 1rem;display:flex;align-items:center;gap:.7rem;
  flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.1);
}
.qr-bar h1{font-size:.95rem;font-weight:800;flex:1;}
.qr-bar .back-btn{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);color:white;}
.qr-prog{font-size:.78rem;opacity:.75;white-space:nowrap;}
.qr-body{
  flex:1;overflow:hidden;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:1.5rem 1rem;
  gap:1rem;
}
.qr-filter{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;}
.qr-filter-btn{
  background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);
  border:1px solid rgba(255,255,255,.25);
  padding:.28rem .85rem;border-radius:999px;cursor:pointer;font-size:.78rem;
  font-family:inherit;
}
.qr-filter-btn.on{background:white;color:#312e81;font-weight:800;}
.qr-card{
  background:var(--bg-card);
  border-radius:14px;width:100%;max-width:780px;
  max-height:calc(100dvh - 200px);overflow-y:auto;
  box-shadow:0 24px 48px rgba(0,0,0,.35);
  display:flex;flex-direction:column;
}
.qr-card-header{
  background:#4f46e5;color:white;
  padding:.9rem 1.3rem;border-radius:14px 14px 0 0;
  cursor:pointer;display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;
}
.qr-card-header h2{font-size:1rem;font-weight:800;margin:0;}
.qr-subj{font-size:.72rem;opacity:.75;margin-bottom:.15rem;}
.qr-hint{font-size:.73rem;opacity:.65;}
.qr-content{padding:1.1rem 1.4rem;display:none;}
.qr-content.open{display:block;}
.qr-controls{display:flex;gap:.7rem;flex-wrap:wrap;justify-content:center;flex-shrink:0;}
.qr-btn{
  background:#4f46e5;color:white;border:none;
  padding:.55rem 1.4rem;border-radius:8px;cursor:pointer;
  font-size:.88rem;font-weight:700;font-family:inherit;
}
.qr-btn:hover{background:#4338ca;}
.qr-btn.sec{background:rgba(255,255,255,.15);}
.qr-btn:disabled{opacity:.3;cursor:not-allowed;}

/* ══════════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════════ */
@media(max-width:700px){
  .menu-btn{display:block;}
  .sidebar{
    position:fixed;top:0;left:0;width:82vw;max-width:290px;
    height:100%;z-index:200;
    transform:translateX(-110%);
    transition:transform .25s cubic-bezier(.4,0,.2,1);
    box-shadow:4px 0 20px rgba(0,0,0,.2);
  }
  .sidebar.open{transform:translateX(0);}
  .sidebar-overlay.open{display:block;}
  .main-layout{flex:1;min-height:0;}
  .content-panel{flex:1;min-width:0;width:100%;padding:1rem .85rem;}
  .top-bar h1{font-size:.85rem;}
  .search-box{width:100px;}
  .home h1{font-size:1.5rem;}
  .home-cards{grid-template-columns:1fr 1fr;max-width:400px;}
}
</style>
</head>
<body>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- ══ HOME ══ -->
<div class="home" id="home">
  <button class="home-back" onclick="history.back()">← 主選單</button>
  <div class="home-badge">牙醫學（五）・補綴＋咬合</div>
  <h1>🦷 補綴學 ＋ 咬合學<br>國考互動筆記</h1>
  <p class="home-sub">105–115 年考古題精析｜PDF 參考資料整合版</p>
  <div class="home-cards">
    <div class="home-card prostho" onclick="openSection('prostho')">
      <div class="icon">🦷</div>
      <h2>補綴學</h2>
      <p>RPD・全口義齒<br>固定補綴・材料</p>
    </div>
    <div class="home-card occ" onclick="openSection('occ')">
      <div class="icon">⚙️</div>
      <h2>咬合學</h2>
      <p>咬合器・TMD<br>美學贋復・全瓷</p>
    </div>
    <div class="home-card tw" onclick="openSection('tw5')">
      <div class="icon">📖</div>
      <h2>Thetawave 筆記</h2>
      <p>義齒・咬合 系統整理</p>
    </div>
    <div class="home-card review" onclick="openQuickReview()">
      <div class="icon">⚡</div>
      <h2>考前速攻</h2>
      <p>極高頻必考主題<br>限時衝刺</p>
    </div>
  </div>
</div>

<!-- ══ QUICK REVIEW ══ -->
<div class="qr-view" id="section-review">
  <div class="qr-bar">
    <button class="back-btn" onclick="goHome()">← 首頁</button>
    <h1>⚡ 考前速攻</h1>
    <span class="qr-prog" id="qr-progress"></span>
  </div>
  <div class="qr-body">
    <div class="qr-filter" id="qr-filter">
      <button class="qr-filter-btn on" data-subj="all" onclick="setQRFilter('all',this)">全部</button>
      <button class="qr-filter-btn" data-subj="prostho" onclick="setQRFilter('prostho',this)">🦷 補綴學</button>
      <button class="qr-filter-btn" data-subj="occ" onclick="setQRFilter('occ',this)">⚙️ 咬合學</button>
      <button class="qr-filter-btn" data-subj="tw5" onclick="setQRFilter('tw5',this)">📖 Thetawave</button>
    </div>
    <div class="qr-card" id="qr-card">
      <div class="qr-card-header" onclick="toggleQRContent()">
        <div>
          <div class="qr-subj" id="qr-subject"></div>
          <h2 id="qr-title"></h2>
        </div>
        <div class="qr-hint" id="qr-hint">點擊展開 ▼</div>
      </div>
      <div class="qr-content content-body" id="qr-content"></div>
    </div>
    <div class="qr-controls">
      <button class="qr-btn sec" id="qr-prev" onclick="qrNav(-1)" disabled>← 上一題</button>
      <button class="qr-btn" id="qr-toggle" onclick="toggleQRContent()">展開內容</button>
      <button class="qr-btn sec" id="qr-next" onclick="qrNav(1)">下一題 →</button>
    </div>
  </div>
</div>

<!-- ══ PROSTHO SECTION ══ -->
<div class="section-view" id="section-prostho">
  <div class="top-bar prostho-bar">
    <button class="menu-btn" onclick="toggleSidebar('prostho')">☰</button>
    <button class="back-btn" onclick="goHome()">← 首頁</button>
    <span class="bar-title">🦷 補綴學</span>
    <input class="search-box" placeholder="搜尋主題…" oninput="doSearch(this.value,'prostho')">
  </div>
  <div class="main-layout">
    <div class="sidebar" id="tree-prostho"></div>
    <div class="content-panel" id="content-prostho">
      <div class="content-placeholder">
        <div class="big">👈</div>
        <p>從左側選擇主題</p>
      </div>
    </div>
  </div>
</div>

<!-- ══ OCCLUSION SECTION ══ -->
<div class="section-view" id="section-occ">
  <div class="top-bar occ-bar">
    <button class="menu-btn" onclick="toggleSidebar('occ')">☰</button>
    <button class="back-btn" onclick="goHome()">← 首頁</button>
    <span class="bar-title">⚙️ 咬合學</span>
    <input class="search-box" placeholder="搜尋主題…" oninput="doSearch(this.value,'occ')">
  </div>
  <div class="main-layout">
    <div class="sidebar" id="tree-occ"></div>
    <div class="content-panel" id="content-occ">
      <div class="content-placeholder">
        <div class="big">👈</div>
        <p>從左側選擇主題</p>
      </div>
    </div>
  </div>
</div>

<!-- ══ THETAWAVE SECTION ══ -->
<div class="section-view" id="section-tw5">
  <div class="top-bar">
    <button class="menu-btn" onclick="toggleSidebar('tw5')">☰</button>
    <button class="back-btn" onclick="goHome()">← 首頁</button>
    <span class="bar-title">📖 Thetawave 筆記</span>
    <input class="search-box" placeholder="搜尋主題…" oninput="doSearch(this.value,'tw5')">
  </div>
  <div class="main-layout">
    <div class="sidebar" id="tree-tw5"></div>
    <div class="content-panel" id="content-tw5">
      <div class="content-placeholder">
        <div class="big">👈</div>
        <p>從左側選擇主題</p>
      </div>
    </div>
  </div>
</div>

<script src="tw5-data.js"></script>
<script src="prostho-data.js"></script>
<script>
/* ══ SIDEBAR TOGGLE ══ */
function toggleSidebar(s){
  const sb=document.getElementById('tree-'+s);
  const ov=document.getElementById('sidebar-overlay');
  sb.classList.toggle('open');
  ov.classList.toggle('open');
}
function closeSidebar(){
  document.querySelectorAll('.sidebar').forEach(s=>s.classList.remove('open'));
  document.getElementById('sidebar-overlay').classList.remove('open');
}

/* ══ NAVIGATION ══ */
const activeItems={prostho:null,occ:null,tw5:null};
function openSection(s){
  document.getElementById('home').style.display='none';
  document.getElementById('section-'+s).style.display='flex';
  if(!activeItems[s]){
    const treeMap={prostho:PROSTHO_TREE,occ:OCC_TREE,tw5:typeof TW5_TREE!=='undefined'?TW5_TREE:[]};
    const tree=treeMap[s]||[];
    if(tree.length>0&&tree[0].children.length>0){
      const ch=document.getElementById('ch-'+s+'-0');
      const arr=document.getElementById('arr-'+s+'-0');
      if(ch){ch.classList.add('open');if(arr)arr.classList.add('open');}
      const el=document.getElementById('tc-'+s+'-0-0');
      if(el) loadContent(s,0,0,tree[0].children[0],el);
    }
  }
}
function goHome(){
  document.querySelectorAll('.section-view').forEach(v=>v.style.display='none');
  document.getElementById('section-review').style.display='none';
  document.getElementById('home').style.display='flex';
}

/* ══ TREE BUILD ══ */
function buildTree(tree,sid){
  const sb=document.getElementById('tree-'+sid);
  let tot=0,done=0;
  tree.forEach((c,ci)=>c.children.forEach((_,ii)=>{tot++;if(ls(`reviewed-${sid}-${ci}-${ii}`)==='1')done++;}));
  sb.innerHTML=`
    <div class="prog-wrap">
      <div class="prog-labels"><span>複習進度</span><span id="prog-lbl-${sid}">${done}/${tot} 完成</span></div>
      <div class="prog-track"><div class="prog-bar" id="prog-bar-${sid}" style="width:${tot?Math.round(done/tot*100):0}%"></div></div>
    </div>`;
  tree.forEach((cat,ci)=>{
    const node=document.createElement('div');node.className='tree-node';
    const par=document.createElement('div');par.className='tree-parent';
    par.innerHTML=`<span class="fdot fdot-${cat.freq}"></span><span style="flex:1">${cat.label}</span><span class="tree-arrow" id="arr-${sid}-${ci}">▶</span>`;
    par.onclick=()=>{
      document.getElementById('ch-'+sid+'-'+ci).classList.toggle('open');
      document.getElementById('arr-'+sid+'-'+ci).classList.toggle('open');
    };
    const kids=document.createElement('div');kids.className='tree-children';kids.id='ch-'+sid+'-'+ci;
    cat.children.forEach((item,ii)=>{
      const child=document.createElement('div');child.className='tree-child';child.id='tc-'+sid+'-'+ci+'-'+ii;
      child.innerHTML=`<span class="fdot fdot-${item.freq}"></span><span class="child-label" title="${item.label}">${item.label}</span>`;
      child.onclick=()=>loadContent(sid,ci,ii,item,child);
      if(ls(`reviewed-${sid}-${ci}-${ii}`)==='1') child.classList.add('reviewed');
      kids.appendChild(child);
    });
    node.appendChild(par);node.appendChild(kids);sb.appendChild(node);
  });
}

/* ══ LOAD CONTENT ══ */
function loadContent(sid,ci,ii,item,el){
  activeItems[sid]={ci,ii,item};
  document.querySelectorAll('#tree-'+sid+' .tree-child').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  const ch=document.getElementById('ch-'+sid+'-'+ci);
  const arr=document.getElementById('arr-'+sid+'-'+ci);
  if(!ch.classList.contains('open')){ch.classList.add('open');arr.classList.add('open');}
  const panel=document.getElementById('content-'+sid);
  const fMap={critical:'badge-critical',high:'badge-high',mid:'badge-mid',low:'badge-low'};
  const fLabel={critical:'極高頻・必考',high:'高頻・重要',mid:'中頻・了解',low:'低頻・參考'};
  const key=`reviewed-${sid}-${ci}-${ii}`;
  const isDone=ls(key)==='1';
  panel.innerHTML=`<div class="content-body">
    <h2>${item.label}<span class="freq-badge ${fMap[item.freq]}">${fLabel[item.freq]}</span></h2>
    ${item.content}
    <button class="review-btn${isDone?' done':''}" id="rbtn-${key}" onclick="toggleReview('${key}','${sid}','${el.id}')">
      ${isDone?'已複習':'標記為已複習'}
    </button>
  </div>`;
  makeCollapsible(panel);
  closeSidebar();
}

/* ══ REVIEW TRACKING ══ */
function toggleReview(key,sid,elId){
  const done=ls(key)==='1';
  done?localStorage.removeItem(key):localStorage.setItem(key,'1');
  const el=document.getElementById(elId);
  const btn=document.getElementById('rbtn-'+key);
  if(!done){
    el&&el.classList.add('reviewed');
    btn&&(btn.classList.add('done'),btn.textContent='已複習');
  } else {
    el&&el.classList.remove('reviewed');
    btn&&(btn.classList.remove('done'),btn.textContent='標記為已複習');
  }
  updateProgress(sid);
}
function updateProgress(sid){
  const treeMap={prostho:PROSTHO_TREE,occ:OCC_TREE,tw5:typeof TW5_TREE!=='undefined'?TW5_TREE:[]};
  const tree=treeMap[sid]||[];
  let tot=0,done=0;
  tree.forEach((c,ci)=>c.children.forEach((_,ii)=>{tot++;if(ls(`reviewed-${sid}-${ci}-${ii}`)==='1')done++;}));
  const bar=document.getElementById('prog-bar-'+sid);
  const lbl=document.getElementById('prog-lbl-'+sid);
  if(bar)bar.style.width=(tot?Math.round(done/tot*100):0)+'%';
  if(lbl)lbl.textContent=`${done}/${tot} 完成`;
}

/* ══ SEARCH ══ */
function stripHtml(h){
  return h.replace(/<[^>]*>/g,'').replace(/&\w+;/g,' ');
}
function doSearch(q,sid){
  const treeMap={prostho:PROSTHO_TREE,occ:OCC_TREE,tw5:typeof TW5_TREE!=='undefined'?TW5_TREE:[]};
  const tree=treeMap[sid]||[];
  if(!q){buildTree(tree,sid);return;}
  const lq=q.toLowerCase();
  const filtered=tree.map(cat=>({...cat,children:cat.children.filter(c=>
    c.label.toLowerCase().includes(lq)||stripHtml(c.content).toLowerCase().includes(lq)
  )})).filter(cat=>cat.children.length>0);
  buildTree(filtered,sid);
  filtered.forEach((_,ci)=>{
    document.getElementById('ch-'+sid+'-'+ci)?.classList.add('open');
    document.getElementById('arr-'+sid+'-'+ci)?.classList.add('open');
  });
  if(filtered.length&&filtered[0].children.length){
    const el=document.getElementById('tc-'+sid+'-0-0');
    if(el)loadContent(sid,0,0,filtered[0].children[0],el);
  }
}

/* ══ COLLAPSIBLE H3 ══ */
function makeCollapsible(panel){
  panel.querySelectorAll('.content-body h3').forEach(h3=>{
    const siblings=[];
    let next=h3.nextElementSibling;
    while(next&&!['H2','H3'].includes(next.tagName)){siblings.push(next);next=next.nextElementSibling;}
    if(!siblings.length)return;
    const wrap=document.createElement('div');
    wrap.style.cssText='overflow:hidden;transition:max-height .28s ease,opacity .28s;max-height:3000px;opacity:1;';
    h3.parentNode.insertBefore(wrap,siblings[0]);
    siblings.forEach(s=>wrap.appendChild(s));
    h3.addEventListener('click',()=>{
      const open=wrap.style.maxHeight!=='0px';
      wrap.style.maxHeight=open?'0px':'3000px';
      wrap.style.opacity=open?'0':'1';
      h3.classList.toggle('collapsed',open);
    });
  });
}

/* ══ QUICK REVIEW ══ */
let qrItems=[],qrIdx=0;
function buildQRItems(subj){
  const sets=[
    {data:typeof PROSTHO_TREE!=='undefined'?PROSTHO_TREE:[],label:'🦷 補綴學',key:'prostho'},
    {data:typeof OCC_TREE!=='undefined'?OCC_TREE:[],label:'⚙️ 咬合學',key:'occ'},
    {data:typeof TW5_TREE!=='undefined'?TW5_TREE:[],label:'📖 Thetawave',key:'tw5'}
  ];
  const items=[];
  sets.forEach(({data,label,key})=>{
    if(subj!=='all'&&subj!==key)return;
    data.forEach(cat=>cat.children.forEach(item=>{
      if(item.freq==='critical')items.push({...item,subject:label});
    }));
  });
  return items;
}
function openQuickReview(){
  document.getElementById('home').style.display='none';
  document.getElementById('section-review').style.display='flex';
  document.querySelectorAll('.qr-filter-btn').forEach(b=>b.classList.toggle('on',b.dataset.subj==='all'));
  qrItems=buildQRItems('all');qrIdx=0;renderQRCard();
}
function setQRFilter(subj,btn){
  document.querySelectorAll('.qr-filter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');qrItems=buildQRItems(subj);qrIdx=0;renderQRCard();
}
function renderQRCard(){
  const item=qrItems[qrIdx];if(!item)return;
  document.getElementById('qr-subject').textContent=item.subject;
  document.getElementById('qr-title').textContent=item.label;
  document.getElementById('qr-content').innerHTML=item.content;
  document.getElementById('qr-content').classList.remove('open');
  document.getElementById('qr-hint').textContent='點擊展開 ▼';
  document.getElementById('qr-toggle').textContent='展開內容';
  document.getElementById('qr-progress').textContent=(qrIdx+1)+' / '+qrItems.length+' 極高頻';
  document.getElementById('qr-prev').disabled=qrIdx===0;
  document.getElementById('qr-next').disabled=qrIdx===qrItems.length-1;
  document.getElementById('qr-card').scrollTop=0;
}
function toggleQRContent(){
  const c=document.getElementById('qr-content');
  const hint=document.getElementById('qr-hint');
  const btn=document.getElementById('qr-toggle');
  const open=c.classList.toggle('open');
  hint.textContent=open?'點擊收合 ▲':'點擊展開 ▼';
  btn.textContent=open?'收合內容':'展開內容';
}
function qrNav(dir){
  qrIdx=Math.max(0,Math.min(qrItems.length-1,qrIdx+dir));
  renderQRCard();document.getElementById('qr-card').scrollTop=0;
}
document.addEventListener('keydown',e=>{
  if(document.getElementById('section-review').style.display!=='flex')return;
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();qrNav(-1);}
  else if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();qrNav(1);}
  else if(e.key===' '||e.key==='Enter'){e.preventDefault();toggleQRContent();}
});

/* ══ INIT ══ */
function ls(k){try{return localStorage.getItem(k);}catch{return null;}}
document.addEventListener('DOMContentLoaded',()=>{
  const trees={prostho:typeof PROSTHO_TREE!=='undefined'?PROSTHO_TREE:[],
                occ:   typeof OCC_TREE!=='undefined'?OCC_TREE:[],
                tw5:   typeof TW5_TREE!=='undefined'?TW5_TREE:[]};
  Object.entries(trees).forEach(([sid,tree])=>buildTree(tree,sid));
});
</script>
</body>
</html>
