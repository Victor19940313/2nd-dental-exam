<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牙醫學（四）國考互動筆記</title>
<style>
:root{--red:#dc2626;--red-bg:#fef2f2;--red-border:#fca5a5;--orange:#c05621;--orange-bg:#fff7ed;--orange-border:#fdba74;--yellow:#92400e;--yellow-bg:#fffbeb;--yellow-border:#fde68a;--green:#166534;--green-bg:#f0fdf4;--green-border:#86efac;--blue:#1e40af;--blue-bg:#eff6ff;--blue-border:#93c5fd;--primary:#1c1917;--primary2:#78350f;--gray:#78716c;--border:#e7e5e4;--bg:#fefce8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;background:var(--bg);color:#2d3748;line-height:1.7;}

/* HOME */
.home{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;background:linear-gradient(135deg,#1c1917 0%,#44403c 60%,#78716c 100%);}
.home h1{color:white;font-size:1.6rem;text-align:center;margin-bottom:.4rem;}
.home p{color:rgba(255,255,255,.75);font-size:.9rem;margin-bottom:2.5rem;text-align:center;}
.home-cards{display:flex;gap:1.5rem;flex-wrap:wrap;justify-content:center;}
.home-card{background:white;border-radius:20px;padding:2.5rem 3rem;text-align:center;cursor:pointer;box-shadow:0 8px 32px rgba(0,0,0,.2);transition:transform .2s,box-shadow .2s;min-width:220px;}
.home-card:hover{transform:translateY(-6px);box-shadow:0 16px 48px rgba(0,0,0,.3);}
.home-card .icon{font-size:3.5rem;margin-bottom:.8rem;}
.home-card h2{font-size:1.3rem;color:var(--primary);margin-bottom:.4rem;}
.home-card p{font-size:.82rem;color:var(--gray);}
.home-card.os{border-top:5px solid var(--red);}
.home-card.rad{border-top:5px solid var(--primary2);}
.home-card.tw{border-top:5px solid #2563eb;}

/* SECTION VIEW */
.section-view{display:none;height:100vh;flex-direction:column;}
.top-bar{background:var(--primary);color:white;padding:.7rem 1rem;display:flex;align-items:center;gap:.8rem;flex-shrink:0;}
.back-btn{background:rgba(255,255,255,.15);border:none;color:white;padding:.3rem .8rem;border-radius:6px;cursor:pointer;font-size:.85rem;}
.back-btn:hover{background:rgba(255,255,255,.25);}
.top-bar h1{font-size:1rem;font-weight:700;}
.search-box{margin-left:auto;background:rgba(255,255,255,.15);border:none;color:white;padding:.3rem .8rem;border-radius:20px;font-size:.85rem;outline:none;width:200px;}
.search-box::placeholder{color:rgba(255,255,255,.6);}
.main-layout{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:280px;background:white;border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;}
.tree-node{border-bottom:1px solid var(--border);}
.tree-parent{display:flex;align-items:center;gap:.5rem;padding:.7rem 1rem;cursor:pointer;font-weight:600;font-size:.88rem;transition:background .15s;}
.tree-parent:hover{background:#ebf8ff;}
.tree-parent.active{background:#ebf8ff;color:var(--primary2);}
.tree-children{display:none;background:#f7fafc;}
.tree-children.open{display:block;}
.tree-child{display:flex;align-items:center;gap:.5rem;padding:.55rem 1rem .55rem 2rem;cursor:pointer;font-size:.84rem;border-left:3px solid transparent;transition:all .15s;}
.tree-child:hover{background:#ebf8ff;border-left-color:var(--primary2);}
.tree-child.active{background:#ebf8ff;border-left-color:var(--primary2);color:var(--primary2);font-weight:600;}
.tree-arrow{margin-left:auto;font-size:.7rem;transition:transform .2s;color:var(--gray);}
.tree-arrow.open{transform:rotate(90deg);}

/* FREQ DOTS */
.freq-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.freq-critical{background:var(--red);}
.freq-high{background:var(--orange);}
.freq-mid{background:var(--yellow);}
.freq-low{background:#a0aec0;}

/* CONTENT PANEL */
.content-panel{flex:1;overflow-y:auto;padding:1.5rem 2rem;}
.content-body{max-width:860px;}
.content-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--gray);text-align:center;}
.content-placeholder .big{font-size:3rem;margin-bottom:1rem;}

/* ── 統一版面節奏：所有 block 元素共用 margin .65rem 0 ── */
/* HEADINGS */
.content-body h2{color:#1c1917;font-size:1.1rem;margin:0 0 1rem;padding-bottom:.4rem;border-bottom:3px solid #fde047;}
.content-body h3{color:#92400e;font-size:.95rem;font-weight:700;margin:1.1rem 0 .45rem;padding:.3rem .6rem;border-left:4px solid #fde047;background:linear-gradient(90deg,#fef9c3,transparent);border-radius:0 4px 4px 0;cursor:pointer;user-select:none;}
.content-body h4{color:var(--primary);font-size:.88rem;font-weight:700;margin:.8rem 0 .3rem;}

/* FREQ BADGE */
.freq-badge{display:inline-block;font-size:.72rem;padding:.15rem .55rem;border-radius:999px;font-weight:700;margin-left:.5rem;vertical-align:middle;}
.badge-critical{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
.badge-high{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-border);}
.badge-mid{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-border);}
.badge-low{background:#f7fafc;color:var(--gray);border:1px solid var(--border);}

/* TABLE — 全寬，與其他 block 等寬 */
table{width:100%;border-collapse:collapse;margin:.65rem 0;font-size:.84rem;border-radius:8px;overflow:hidden;}
th{background:#1c1917;color:#fef9c3;padding:.5rem .7rem;text-align:left;font-weight:600;font-size:.82rem;}
td{padding:.48rem .7rem;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.6;}
tr:last-child td{border-bottom:none;}
tr:nth-child(even) td{background:#f7fafc;}
tr:hover td{background:#ebf8ff;}
.td-k{font-weight:700;color:var(--primary2);white-space:nowrap;}
.td-r{color:var(--red);font-weight:700;}
.td-g{color:var(--green);font-weight:600;}

/* LIST */
ul.n{list-style:none;padding:0;margin:.5rem 0;}
ul.n li{padding:.3rem 0 .3rem 1.2rem;position:relative;font-size:.87rem;border-bottom:1px solid #f0f4f8;}
ul.n li:last-child{border-bottom:none;}
ul.n li::before{content:"▸";position:absolute;left:0;color:var(--primary2);}

/* BOX — 全圓角，左色條，與其他 block 等寬 */
.box{padding:.7rem 1rem;border-radius:8px;margin:.65rem 0;font-size:.86rem;line-height:1.65;border-left:4px solid;}
.box-red{background:var(--red-bg);border-color:var(--red);color:var(--red);}
.box-orange{background:var(--orange-bg);border-color:var(--orange);color:#7b341e;}
.box-blue{background:#ebf8ff;border-color:var(--primary2);color:#1a365d;}
.box-green{background:var(--green-bg);border-color:var(--green);color:#1c4532;}
.box-yellow{background:var(--yellow-bg);border-color:var(--yellow);color:#744210;}

/* NUM GRID */
.num-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:.5rem;margin:.65rem 0;}
.num-card{background:#ebf8ff;border-radius:8px;padding:.6rem;text-align:center;border:1px solid #bee3f8;}
.num-card .big{font-size:1.35rem;font-weight:800;color:var(--red);}
.num-card .sm{font-size:.73rem;color:var(--gray);line-height:1.3;}

/* TAG */
.tag{display:inline-block;background:#e2e8f0;color:#4a5568;font-size:.72rem;padding:.15rem .45rem;border-radius:4px;margin:.1rem;}
.tag-r{background:var(--red-bg);color:var(--red);}
.tag-g{background:var(--green-bg);color:var(--green);}

/* IMG BOX — 全寬，與 table / box 等寬 */
.img-box{background:#1a202c;border-radius:8px;padding:.75rem;margin:.65rem 0;text-align:center;border:1px solid #4a5568;}
.img-box img{max-width:100%;max-height:340px;border-radius:6px;object-fit:contain;display:block;margin:0 auto;}
.img-caption{font-size:.76rem;color:#a0aec0;margin-top:.5rem;font-style:italic;line-height:1.5;}
.img-row{display:flex;gap:.65rem;flex-wrap:wrap;margin:.65rem 0;}
.img-row .img-box{flex:1;min-width:160px;}

/* STEPS */
.steps{counter-reset:step;}
.step{counter-increment:step;background:#ebf8ff;border-radius:8px;padding:.6rem .9rem;margin:.4rem 0;font-size:.86rem;border-left:4px solid var(--primary2);}
.step::before{content:counter(step)". ";font-weight:800;color:var(--primary2);}

/* PEARL — 全圓角，與 box 一致 */
.pearl{background:#f0fff4;border-left:4px solid var(--green);border-radius:8px;padding:.65rem 1rem;margin:.65rem 0;font-size:.86rem;line-height:1.65;color:#1c4532;}
.pearl::before{content:"💡 ";}

/* MNEMONIC — 背誦心法專屬樣式 */
.mnemonic{background:#fefce8;border:2px dashed #fde047;border-radius:8px;padding:.7rem 1rem;margin:.65rem 0;font-size:.86rem;line-height:1.7;position:relative;}
.mnemonic::before{content:"🧠 背誦心法";display:block;font-weight:800;color:#c05621;font-size:.78rem;margin-bottom:.3rem;letter-spacing:.05em;}
.mnemonic strong{color:#c05621;}
.mnemonic .keyword{background:#feebc8;border-radius:4px;padding:.05rem .3rem;font-weight:700;color:#7b341e;}

/* PROGRESS — 進度追蹤 */
.progress-bar-wrap{background:#e2e8f0;border-radius:999px;height:6px;margin:.4rem 1rem .6rem;overflow:hidden;}
.progress-bar{height:100%;background:linear-gradient(90deg,#fde047,#f59e0b);border-radius:999px;transition:width .4s;}
.progress-label{font-size:.72rem;color:var(--gray);padding:0 1rem .2rem;display:flex;justify-content:space-between;}
.review-btn{display:flex;align-items:center;gap:.4rem;margin:.8rem 0 0;background:none;border:1.5px solid #cbd5e0;border-radius:6px;padding:.3rem .8rem;font-size:.8rem;color:var(--gray);cursor:pointer;transition:all .2s;}
.review-btn:hover{border-color:#48bb78;color:#276749;}
.review-btn.done{background:#f0fff4;border-color:#68d391;color:#276749;font-weight:700;}
.review-btn.done::before{content:"✓ ";}
.tree-child.reviewed::after{content:" ✓";color:#48bb78;font-size:.75rem;font-weight:700;}

/* DIAGRAM BLOCK — 可收合圖示 */
.diag-block{margin:.65rem 0;border:1px solid #bee3f8;border-radius:8px;overflow:hidden;}
.diag-block>summary{background:#ebf8ff;color:var(--primary);padding:.55rem 1rem;cursor:pointer;font-size:.86rem;font-weight:700;list-style:none;display:flex;align-items:center;gap:.5rem;user-select:none;}
.diag-block>summary::-webkit-details-marker{display:none;}
.diag-block>summary::after{content:"▼";margin-left:auto;font-size:.72rem;transition:transform .2s;}
.diag-block[open]>summary::after{transform:rotate(180deg);}
.diag-inner{padding:.5rem;}

/* EXAM BLOCK — 與其他 block 等寬，全圓角 */
.exam-block{margin:.65rem 0;border:1px solid #b794f4;border-radius:8px;overflow:hidden;}
.exam-block>summary{background:#553c9a;color:white;padding:.6rem 1rem;cursor:pointer;font-size:.86rem;font-weight:700;list-style:none;display:flex;align-items:center;gap:.5rem;user-select:none;}
.exam-block>summary::-webkit-details-marker{display:none;}
.exam-block>summary::after{content:"▼";margin-left:auto;font-size:.72rem;transition:transform .2s;}
.exam-block[open]>summary::after{transform:rotate(180deg);}
.exam-list{padding:.7rem 1rem;}
.exam-item{margin:.45rem 0;border-bottom:1px solid #e9d8fd;padding-bottom:.45rem;}
.exam-item:last-child{border-bottom:none;padding-bottom:0;}
.eq{font-size:.86rem;font-weight:700;color:#44337a;margin-bottom:.3rem;}
.ans-details>summary{font-size:.8rem;color:#553c9a;cursor:pointer;list-style:none;padding:.2rem 0;user-select:none;}
.ans-details>summary::-webkit-details-marker{display:none;}
.ea{background:#f3e8ff;border-left:3px solid #553c9a;padding:.5rem .8rem;margin:.3rem 0;font-size:.84rem;border-radius:8px;line-height:1.6;}

/* QUICK REVIEW */
.home-card.review{border-top:5px solid #553c9a;}
.qr-view{display:none;height:100vh;flex-direction:column;background:#1a202c;}
.qr-bar{background:#553c9a;color:white;padding:.7rem 1rem;display:flex;align-items:center;gap:.8rem;flex-shrink:0;}
.qr-bar h1{font-size:1rem;font-weight:700;flex:1;}
.qr-bar .back-btn{background:rgba(255,255,255,.2);}
.qr-progress{font-size:.8rem;opacity:.8;white-space:nowrap;}
.qr-body{flex:1;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;}
.qr-card{background:white;border-radius:16px;width:100%;max-width:800px;max-height:calc(100vh - 160px);overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.4);display:flex;flex-direction:column;}
.qr-card-header{background:#553c9a;color:white;padding:1rem 1.5rem;border-radius:16px 16px 0 0;cursor:pointer;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.qr-card-header h2{font-size:1.05rem;margin:0;}
.qr-card-subject{font-size:.75rem;opacity:.75;margin-bottom:.2rem;}
.qr-card-hint{font-size:.75rem;opacity:.7;}
.qr-card-content{padding:1.2rem 1.5rem;display:none;}
.qr-card-content.open{display:block;}
.qr-controls{display:flex;gap:.8rem;margin-top:1rem;flex-shrink:0;}
.qr-btn{background:#553c9a;color:white;border:none;padding:.6rem 1.5rem;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:600;}
.qr-btn:hover{background:#44337a;}
.qr-btn.sec{background:#2d3748;}
.qr-btn:disabled{opacity:.35;cursor:not-allowed;}
.qr-filter{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;margin-bottom:1rem;}
.qr-filter-btn{background:rgba(255,255,255,.1);color:white;border:1px solid rgba(255,255,255,.3);padding:.3rem .8rem;border-radius:999px;cursor:pointer;font-size:.8rem;}
.qr-filter-btn.on{background:white;color:#553c9a;font-weight:700;}
@supports(height:100dvh){.qr-view{height:100dvh;}}

/* ── 漢堡按鈕 & 遮罩（桌機隱藏） ── */
.menu-btn{display:none;background:rgba(255,255,255,.15);border:none;color:white;font-size:1.2rem;padding:.3rem .6rem;border-radius:6px;cursor:pointer;line-height:1;flex-shrink:0;}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199;}

/* ── 全域防溢出 ── */
body{overflow-x:hidden;}
.content-body table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:100%;}
.content-body svg{max-width:100% !important;height:auto !important;}
.content-body img{max-width:100%;height:auto;}
.content-body div[style*="grid"]{min-width:0;}

/* ── 手機版（≤700px）── */
.hl-y{background:#fef08a;border-radius:2px;padding:0 .15rem;}
.hl-g{background:#bbf7d0;border-radius:2px;padding:0 .15rem;}
.hl-p{background:#e9d5ff;border-radius:2px;padding:0 .15rem;}
.sidebar{background:#fffef5;}
.content-panel{background:#fefce8;}
@media(max-width:700px){
  /* 全頁高度用 dvh 避免 iOS 底部欄干擾 */
  .section-view{height:100dvh;height:100vh;} /* fallback then override */
  @supports(height:100dvh){.section-view{height:100dvh;}}

  /* 側邊欄 → 左滑抽屜 */
  .sidebar{
    position:fixed;top:0;left:0;
    width:82vw;max-width:300px;
    height:100%;height:100dvh;
    z-index:200;
    transform:translateX(-110%);
    transition:transform .25s cubic-bezier(.4,0,.2,1);
    box-shadow:6px 0 24px rgba(0,0,0,.25);
    overflow-y:auto;-webkit-overflow-scrolling:touch;
  }
  .sidebar.open{transform:translateX(0);}
  .sidebar-overlay.open{display:block;}

  /* 內容區填滿 */
  .main-layout{flex:1;min-height:0;}
  .content-panel{flex:1;min-width:0;width:100%;overflow-x:hidden;}

  /* 頂部列 */
  .menu-btn{display:block;}
  .top-bar h1{font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .search-box{width:100px;font-size:.8rem;}

  /* 首頁卡片 */
  .home-card{padding:1.6rem 1.8rem;min-width:140px;}
  .home-card h2{font-size:1.05rem;}
  .home p{font-size:.82rem;}

  /* 內容文字 */
  .content-body{max-width:100%;}
  .content-body h2{font-size:1rem;}
  .content-body h3{font-size:.88rem;}
  .content-panel{padding:1rem .8rem;}
  .box,.pearl,.step,.img-box,.exam-block,.num-grid{margin:.5rem 0;}

  /* 多欄 grid 降為 2 欄或單欄 */
  .num-grid{grid-template-columns:repeat(2,1fr);}
  div[style*="grid-template-columns: 1fr 1fr 1fr"]{display:flex !important;flex-wrap:wrap !important;gap:.5rem !important;}
  div[style*="grid-template-columns: 1fr 1fr 1fr"] > *{flex:1 1 45% !important;min-width:140px;}
  div[style*="grid-template-columns: repeat(4"]{display:grid !important;grid-template-columns:repeat(2,1fr) !important;}
}


/* ════════════════════════════════════════════
   NOTEBOOK STYLE OVERRIDE v2 — 完整格子筆記本
════════════════════════════════════════════ */
:root{
  --nb-bg:   #f8f7f0;
  --nb-card: #ffffff;
  --nb-gc:   rgba(160,155,130,0.18);
  --nb-gs:   22px;
  --nb-text: #2d2a22;
  --nb-sub:  #7a7060;
  --nb-bd:   #e4e0d4;
  --nb-bdk:  #c8c3b0;
}

/* ── Body & global ── */
body {
  background-color: var(--nb-bg) !important;
  background-image:
    linear-gradient(var(--nb-gc) 1px, transparent 1px),
    linear-gradient(90deg, var(--nb-gc) 1px, transparent 1px) !important;
  background-size: var(--nb-gs) var(--nb-gs) !important;
  background-attachment: fixed !important;
  font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif !important;
}

/* ── 首頁 home ── */
.home {
  background: transparent !important;
}
.home h1 { color: var(--nb-text) !important; text-shadow: none !important; }
.home > p { color: var(--nb-sub) !important; }
.home-cards { gap: 1.1rem !important; }
.home-card {
  background: var(--nb-card) !important;
  border: 1.5px solid var(--nb-bd) !important;
  box-shadow: 0 2px 10px rgba(0,0,0,.07) !important;
  color: var(--nb-text) !important;
  border-radius: 16px !important;
}
.home-card:hover {
  box-shadow: 0 8px 28px rgba(0,0,0,.12) !important;
  transform: translateY(-4px) !important;
}
.home-card h2 { color: var(--nb-text) !important; }
.home-card p  { color: var(--nb-sub) !important; }

/* ── Section view ── */
.section-view {
  background: transparent !important;
}

/* ── Top Bar ── */
.top-bar {
  background: #ffffff !important;
  color: var(--nb-text) !important;
  border-bottom: 1.5px solid var(--nb-bd) !important;
  box-shadow: 0 1px 6px rgba(0,0,0,.07) !important;
}
.top-bar h1 { color: var(--nb-text) !important; font-size: 1rem !important; }
.back-btn {
  background: #f0ede4 !important;
  color: var(--nb-text) !important;
  border: 1px solid var(--nb-bdk) !important;
}
.back-btn:hover { background: var(--nb-bd) !important; color: var(--nb-text) !important; }
.search-box {
  background: #f0ede4 !important;
  color: var(--nb-text) !important;
  border: 1.5px solid var(--nb-bd) !important;
}
.search-box::placeholder { color: var(--nb-sub) !important; }

/* ── Sidebar ── */
.sidebar {
  background: #fefdf8 !important;
  border-right: 1.5px solid var(--nb-bd) !important;
}
.tree-parent { color: var(--nb-text) !important; }
.tree-parent:hover { background: #f0ede4 !important; }
.tree-parent.active { background: #eff6ff !important; color: #1d4ed8 !important; }
.tree-children { background: #f7f5ef !important; }
.tree-child:hover { background: #eef2ff !important; border-left-color: #4f46e5 !important; }
.tree-child.active { background: #eff6ff !important; border-left-color: #4f46e5 !important; color: #1d4ed8 !important; }

/* ── Content area ── */
.content-panel {
  background: transparent !important;
}
.content-body h2 {
  color: var(--nb-text) !important;
  border-bottom: 2px solid var(--nb-bdk) !important;
}
.content-body h3 {
  background: linear-gradient(90deg, #fef9c3, transparent) !important;
  border-left: 4px solid #e9a800 !important;
  color: #5a4000 !important;
}

/* ── Tables ── */
table {
  background: #ffffff !important;
  border: 1px solid var(--nb-bd) !important;
  box-shadow: 0 1px 4px rgba(0,0,0,.06) !important;
}
th {
  background: #3b3530 !important;
  color: #fef9c3 !important;
  border-bottom: 2px solid var(--nb-bdk) !important;
}
td {
  border-bottom: 1px solid #e8e4da !important;
}
tr:nth-child(odd) td { background: #ffffff !important; }
tr:nth-child(even) td { background: #f0f0ea !important; }
tr:hover td { background: #e8f0fe !important; }

/* ── Progress bar ── */
.progress-bar-wrap { background: var(--nb-bd) !important; }
.progress-label { color: var(--nb-sub) !important; }

/* ── Quick Review ── */
.qr-view { background: var(--nb-bg) !important; }
.qr-body { background: transparent !important; }
.qr-bar { background: #3730a3 !important; }
.qr-card { box-shadow: 0 8px 40px rgba(0,0,0,.18) !important; }
.qr-card-header { background: #3730a3 !important; }

/* ── 內容佔位符 ── */
.content-placeholder { color: var(--nb-sub) !important; }

</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>

<!-- 手機側邊欄遮罩 -->
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- HOME -->
<div class="home" id="home" style="position:relative">
  <button onclick="history.back()" style="position:absolute;top:1rem;right:1rem;background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.4);color:white;padding:.35rem .85rem;border-radius:8px;font-size:.82rem;cursor:pointer">← 主選單</button>
  <h1>🦷 牙醫學（四）國考互動筆記</h1>
  <p>105–115 年考古題精析｜點選科目開始複習</p>
  <div class="home-cards">
    <div class="home-card os" onclick="openSection('os')">
      <div class="icon">🏥</div>
      <h2>口腔外科</h2>
      <p>局部麻醉・腫瘤囊腫<br>外傷・感染・手術</p>
    </div>
    <div class="home-card rad" onclick="openSection('rad')">
      <div class="icon">☢️</div>
      <h2>放射線學</h2>
      <p>影像判讀・攝影技術<br>物理・防護</p>
    </div>
    <div class="home-card tw" onclick="openSection('tw4')">
      <div class="icon">📖</div>
      <h2>Thetawave 筆記</h2>
      <p>口外・放射 系統整理</p>
    </div>
    <div class="home-card review" onclick="openQuickReview()">
      <div class="icon">⚡</div>
      <h2>考前速攻</h2>
      <p>極高頻必考主題<br>限時衝刺複習</p>
    </div>
  </div>
</div>

<!-- QUICK REVIEW -->
<div class="qr-view" id="section-review">
  <div class="qr-bar">
    <button class="back-btn" onclick="goHome()">← 首頁</button>
    <h1>⚡ 考前速攻</h1>
    <span class="qr-progress" id="qr-progress"></span>
  </div>
  <div class="qr-body">
    <div class="qr-filter" id="qr-filter">
      <button class="qr-filter-btn on" data-subj="all" onclick="setQRFilter('all',this)">全部</button>
      <button class="qr-filter-btn" data-subj="os" onclick="setQRFilter('os',this)">🏥 口腔外科</button>
      <button class="qr-filter-btn" data-subj="rad" onclick="setQRFilter('rad',this)">☢️ 放射線學</button>
      <button class="qr-filter-btn" data-subj="tw4" onclick="setQRFilter('tw4',this)">📖 Thetawave</button>
    </div>
    <div class="qr-card" id="qr-card">
      <div class="qr-card-header" onclick="toggleQRContent()">
        <div>
          <div class="qr-card-subject" id="qr-subject"></div>
          <h2 id="qr-title"></h2>
        </div>
        <div class="qr-card-hint" id="qr-hint">點擊展開內容 ▼</div>
      </div>
      <div class="qr-card-content content-body" id="qr-content"></div>
    </div>
    <div class="qr-controls">
      <button class="qr-btn sec" id="qr-prev" onclick="qrNav(-1)" disabled>← 上一題</button>
      <button class="qr-btn" id="qr-toggle" onclick="toggleQRContent()">展開內容</button>
      <button class="qr-btn sec" id="qr-next" onclick="qrNav(1)">下一題 →</button>
    </div>
  </div>
</div>

<!-- OS SECTION -->
<div class="section-view" id="section-os">
  <div class="top-bar">
    <button class="menu-btn" onclick="toggleSidebar('os')">☰</button>
    <button class="back-btn" onclick="goHome()">← 首頁</button>
    <h1>🏥 口腔外科</h1>
    <input class="search-box" placeholder="搜尋..." oninput="doSearch(this.value,'os')">
  </div>
  <div class="main-layout">
    <div class="sidebar" id="tree-os"></div>
    <div class="content-panel" id="content-os">
      <div class="content-placeholder"><div class="big">👈</div><p>從左側選擇主題</p></div>
    </div>
  </div>
</div>

<!-- RAD SECTION -->
<div class="section-view" id="section-rad">
  <div class="top-bar">
    <button class="menu-btn" onclick="toggleSidebar('rad')">☰</button>
    <button class="back-btn" onclick="goHome()">← 首頁</button>
    <h1>☢️ 放射線學</h1>
    <input class="search-box" placeholder="搜尋..." oninput="doSearch(this.value,'rad')">
  </div>
  <div class="main-layout">
    <div class="sidebar" id="tree-rad"></div>
    <div class="content-panel" id="content-rad">
      <div class="content-placeholder"><div class="big">👈</div><p>從左側選擇主題</p></div>
    </div>
  </div>
</div>

<!-- TW SECTION -->
<div class="section-view" id="section-tw4">
  <div class="top-bar">
    <button class="menu-btn" onclick="toggleSidebar('tw4')">☰</button>
    <button class="back-btn" onclick="goHome()">← 首頁</button>
    <h1>📖 Thetawave 筆記</h1>
    <input class="search-box" placeholder="搜尋..." oninput="doSearch(this.value,'tw4')">
  </div>
  <div class="main-layout">
    <div class="sidebar" id="tree-tw4"></div>
    <div class="content-panel" id="content-tw4">
      <div class="content-placeholder"><div class="big">👈</div><p>從左側選擇主題</p></div>
    </div>
  </div>
</div>

<script src="tw4-data.js"></script>
<script src="os-data.js"></script>
<script src="rad-data.js"></script>
<script src="diagrams.js"></script>
<script>
function toggleSidebar(sectionId){
  const sb=document.getElementById('tree-'+sectionId);
  const ov=document.getElementById('sidebar-overlay');
  sb.classList.toggle('open');
  ov.classList.toggle('open');
}
function closeSidebar(){
  document.querySelectorAll('.sidebar').forEach(s=>s.classList.remove('open'));
  document.getElementById('sidebar-overlay').classList.remove('open');
}
function openSection(s){
  document.getElementById('home').style.display='none';
  document.getElementById('section-'+s).style.display='flex';
}
function goHome(){
  document.querySelectorAll('.section-view').forEach(v=>v.style.display='none');
  document.getElementById('section-review').style.display='none';
  document.getElementById('home').style.display='flex';
}

function buildTree(tree, sectionId){
  const sidebar = document.getElementById('tree-'+sectionId);
  // count done
  let total=0,done=0;
  tree.forEach((cat,ci)=>cat.children.forEach((_,ii)=>{total++;if(localStorage.getItem(`reviewed-${sectionId}-${ci}-${ii}`)==='1')done++;}));
  sidebar.innerHTML=`<div class="progress-label"><span>複習進度</span><span id="prog-lbl-${sectionId}">${done} / ${total} 完成</span></div><div class="progress-bar-wrap"><div class="progress-bar" id="prog-bar-${sectionId}" style="width:${total?Math.round(done/total*100):0}%"></div></div>`;
  tree.forEach((cat,ci)=>{
    const node = document.createElement('div');
    node.className='tree-node';
    const parent = document.createElement('div');
    parent.className='tree-parent';
    parent.innerHTML=`<span class="freq-dot freq-${cat.freq}"></span><span style="flex:1">${cat.label}</span><span class="tree-arrow" id="arr-${sectionId}-${ci}">▶</span>`;
    parent.onclick=()=>{
      const ch=document.getElementById('ch-'+sectionId+'-'+ci);
      const arr=document.getElementById('arr-'+sectionId+'-'+ci);
      ch.classList.toggle('open');
      arr.classList.toggle('open');
    };
    const children=document.createElement('div');
    children.className='tree-children';
    children.id='ch-'+sectionId+'-'+ci;
    cat.children.forEach((item,ii)=>{
      const child=document.createElement('div');
      child.className='tree-child';
      child.id='tc-'+sectionId+'-'+ci+'-'+ii;
      child.innerHTML=`<span class="freq-dot freq-${item.freq}"></span><span>${item.label}</span>`;
      child.onclick=()=>loadContent(sectionId,ci,ii,item,child);
      children.appendChild(child);
    });
    node.appendChild(parent);
    node.appendChild(children);
    sidebar.appendChild(node);
  });
}

function loadContent(sectionId,ci,ii,item,el){
  document.querySelectorAll('#tree-'+sectionId+' .tree-child').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  const ch=document.getElementById('ch-'+sectionId+'-'+ci);
  const arr=document.getElementById('arr-'+sectionId+'-'+ci);
  if(!ch.classList.contains('open')){ch.classList.add('open');arr.classList.add('open');}
  const panel=document.getElementById('content-'+sectionId);
  const freqMap={critical:'badge-critical',high:'badge-high',mid:'badge-mid',low:'badge-low'};
  const freqLabel={critical:'極高頻・必考',high:'高頻・重要',mid:'中頻・了解',low:'低頻・參考'};
  const key=`reviewed-${sectionId}-${ci}-${ii}`;
  const isDone=localStorage.getItem(key)==='1';
  panel.innerHTML=`<div class="content-body">
    <h2>${item.label}<span class="freq-badge ${freqMap[item.freq]}">${freqLabel[item.freq]}</span></h2>
    ${item.content}
    <button class="review-btn${isDone?' done':''}" id="rbtn-${key}" onclick="toggleReview('${key}','${sectionId}','${el.id}')">
      ${isDone?'已複習':'標記為已複習'}
    </button>
  </div>`;
  if(isDone) el.classList.add('reviewed'); else el.classList.remove('reviewed');
  if(typeof injectDiagrams==='function') injectDiagrams(panel, item.label);
  makeCollapsible(panel);
  closeSidebar();
}

function toggleReview(key,sectionId,elId){
  const done=localStorage.getItem(key)==='1';
  if(done){localStorage.removeItem(key);}else{localStorage.setItem(key,'1');}
  const el=document.getElementById(elId);
  const btn=document.getElementById('rbtn-'+key);
  if(!done){
    if(el) el.classList.add('reviewed');
    if(btn){btn.classList.add('done');btn.textContent='已複習';}
  } else {
    if(el) el.classList.remove('reviewed');
    if(btn){btn.classList.remove('done');btn.textContent='標記為已複習';}
  }
  updateProgress(sectionId);
}

function updateProgress(sectionId){
  const tree=sectionId==='os'?OS_TREE:sectionId==='rad'?RAD_TREE:sectionId==='tw4'?TW4_TREE:typeof PROSTHO_TREE!=='undefined'?PROSTHO_TREE:[];
  let total=0,done=0;
  tree.forEach((cat,ci)=>{
    cat.children.forEach((_,ii)=>{
      total++;
      if(localStorage.getItem(`reviewed-${sectionId}-${ci}-${ii}`)==='1') done++;
    });
  });
  const bar=document.getElementById('prog-bar-'+sectionId);
  const lbl=document.getElementById('prog-lbl-'+sectionId);
  if(bar) bar.style.width=(total?Math.round(done/total*100):0)+'%';
  if(lbl) lbl.textContent=`${done} / ${total} 完成`;
}

function stripHtml(html){
  let t=html.replace(/<[^>]*>/g,'');
  t=t.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#36;/g,'$').replace(/&nbsp;/g,' ');
  t=t.replace(/&#(\d+);/g,(_,n)=>String.fromCharCode(n));
  return t;
}
function doSearch(q,sectionId){
  const tree=sectionId==='os'?OS_TREE:sectionId==='rad'?RAD_TREE:sectionId==='tw4'?TW4_TREE:RAD_TREE;
  if(!q||q.length<1){buildTree(tree,sectionId);return;}
  const lq=q.toLowerCase();
  const filtered=tree.map(cat=>({...cat,children:cat.children.filter(c=>
    c.label.toLowerCase().includes(lq)||stripHtml(c.content).toLowerCase().includes(lq)
  )})).filter(cat=>cat.children.length>0||cat.label.toLowerCase().includes(lq));
  buildTree(filtered,sectionId);
  filtered.forEach((_,ci)=>{
    const ch=document.getElementById('ch-'+sectionId+'-'+ci);
    const arr=document.getElementById('arr-'+sectionId+'-'+ci);
    if(ch){ch.classList.add('open');arr.classList.add('open');}
  });
  if(filtered.length>0&&filtered[0].children.length>0){
    const firstEl=document.getElementById('tc-'+sectionId+'-0-0');
    if(firstEl) loadContent(sectionId,0,0,filtered[0].children[0],firstEl);
  }
}

// ── Quick Review Mode ──
let qrItems=[], qrIdx=0, qrSubjFilter='all';

function buildQRItems(subj){
  const items=[];
  const sets=[
    {data:OS_TREE, label:'🏥 口腔外科', key:'os'},
    {data:RAD_TREE, label:'☢️ 放射線學', key:'rad'},
    {data:typeof TW4_TREE!=='undefined'?TW4_TREE:[], label:'📖 Thetawave', key:'tw4'}
  ];
  sets.forEach(({data,label,key})=>{
    if(subj!=='all'&&subj!==key) return;
    data.forEach(cat=>{
      cat.children.forEach(item=>{
        if(item.freq==='critical'){
          items.push({...item, subject:label});
        }
      });
    });
  });
  return items;
}

function openQuickReview(){
  document.getElementById('home').style.display='none';
  document.getElementById('section-review').style.display='flex';
  qrSubjFilter='all';
  document.querySelectorAll('.qr-filter-btn').forEach(b=>{b.classList.toggle('on', b.dataset.subj==='all');});
  qrItems=buildQRItems('all');
  qrIdx=0;
  renderQRCard();
}

function setQRFilter(subj, btn){
  qrSubjFilter=subj;
  document.querySelectorAll('.qr-filter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  qrItems=buildQRItems(subj);
  qrIdx=0;
  renderQRCard();
}

function renderQRCard(){
  const item=qrItems[qrIdx];
  if(!item) return;
  document.getElementById('qr-subject').textContent=item.subject;
  document.getElementById('qr-title').textContent=item.label;
  document.getElementById('qr-content').innerHTML=item.content;
  document.getElementById('qr-content').classList.remove('open');
  document.getElementById('qr-hint').textContent='點擊展開內容 ▼';
  document.getElementById('qr-toggle').textContent='展開內容';
  document.getElementById('qr-progress').textContent=(qrIdx+1)+' / '+qrItems.length+' 極高頻主題';
  document.getElementById('qr-prev').disabled=(qrIdx===0);
  document.getElementById('qr-next').disabled=(qrIdx===qrItems.length-1);
  document.getElementById('qr-card').scrollTop=0;
}

function toggleQRContent(){
  const c=document.getElementById('qr-content');
  const hint=document.getElementById('qr-hint');
  const btn=document.getElementById('qr-toggle');
  const open=c.classList.toggle('open');
  hint.textContent=open?'點擊收合 ▲':'點擊展開內容 ▼';
  btn.textContent=open?'收合內容':'展開內容';
}

function qrNav(dir){
  qrIdx=Math.max(0,Math.min(qrItems.length-1,qrIdx+dir));
  renderQRCard();
  document.getElementById('qr-card').scrollTop=0;
}

function makeCollapsible(panel) {
  panel.querySelectorAll('.content-body h3').forEach(h3 => {
    const arrow = document.createElement('span');
    arrow.textContent = ' ▾';
    arrow.style.cssText = 'font-size:.75rem;color:#f59e0b;margin-left:.3rem;transition:transform .25s;display:inline-block;';
    h3.appendChild(arrow);
    const siblings = [];
    let next = h3.nextElementSibling;
    while (next && !['H2','H3','HR'].includes(next.tagName)) {
      siblings.push(next);
      next = next.nextElementSibling;
    }
    if (siblings.length === 0) return;
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'overflow:hidden;transition:max-height .3s ease,opacity .3s ease;max-height:2000px;opacity:1;';
    h3.parentNode.insertBefore(wrapper, siblings[0]);
    siblings.forEach(s => wrapper.appendChild(s));
    h3.addEventListener('click', () => {
      const isOpen = wrapper.style.maxHeight !== '0px';
      wrapper.style.maxHeight = isOpen ? '0px' : '2000px';
      wrapper.style.opacity = isOpen ? '0' : '1';
      arrow.style.transform = isOpen ? 'rotate(-90deg)' : 'rotate(0deg)';
    });
  });
}

// init
document.addEventListener('DOMContentLoaded',()=>{
  buildTree(OS_TREE,'os');
  buildTree(RAD_TREE,'rad');
  if(typeof TW4_TREE!=='undefined') buildTree(TW4_TREE,'tw4');
  // restore reviewed markers in sidebar
  ['os','rad','tw4'].forEach(sid=>{
    const tree=sid==='os'?OS_TREE:sid==='rad'?RAD_TREE:sid==='tw4'&&typeof TW4_TREE!=='undefined'?TW4_TREE:[];
    tree.forEach((cat,ci)=>cat.children.forEach((_,ii)=>{
      if(localStorage.getItem(`reviewed-${sid}-${ci}-${ii}`)==='1'){
        const el=document.getElementById(`tc-${sid}-${ci}-${ii}`);
        if(el) el.classList.add('reviewed');
      }
    }));
  });
});
</script>
</body>
</html>
